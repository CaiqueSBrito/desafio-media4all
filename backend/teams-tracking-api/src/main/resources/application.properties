spring.application.name=backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.config.import=optional:file:.env[.properties],optional:file:../../.env[.properties]

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

external.api.base-url=${EXTERNAL_BASE_URL:${EXTERNAL_URL_BASE:${EXTERNAL_API_BASE_URL:${URL_BASE:}}}}
external.api.api-key=${EXTERNAL_API_KEY:${API_KEY:}}
external.api.timeout=${EXTERNAL_API_TIMEOUT_MS:}
external.api.retry.max-attempts=${EXTERNAL_API_RETRY_MAX_ATTEMPTS:}
external.api.retry.backoff=${EXTERNAL_API_RETRY_BACKOFF_MS:}

sync.schedulers.enabled=${SYNC_SCHEDULERS_ENABLED:true}
sync.schedulers.agents.initial-delay-ms=${SYNC_SCHEDULER_AGENTS_INITIAL_DELAY_MS:30000}
sync.schedulers.agents.fixed-delay-ms=${SYNC_SCHEDULER_AGENTS_FIXED_DELAY_MS:300000}
sync.schedulers.locations.initial-delay-ms=${SYNC_SCHEDULER_LOCATIONS_INITIAL_DELAY_MS:30000}
sync.schedulers.locations.fixed-delay-ms=${SYNC_SCHEDULER_LOCATIONS_FIXED_DELAY_MS:60000}
sync.locations.max-accuracy-meters=${SYNC_LOCATIONS_MAX_ACCURACY_METERS:50}
sync.schedulers.check-ins.initial-delay-ms=${SYNC_SCHEDULER_CHECK_INS_INITIAL_DELAY_MS:30000}
sync.schedulers.check-ins.fixed-delay-ms=${SYNC_SCHEDULER_CHECK_INS_FIXED_DELAY_MS:60000}
sync.schedulers.geofences.initial-delay-ms=${SYNC_SCHEDULER_GEOFENCES_INITIAL_DELAY_MS:30000}
sync.schedulers.geofences.fixed-delay-ms=${SYNC_SCHEDULER_GEOFENCES_FIXED_DELAY_MS:600000}
