spring.datasource.url=jdbc:h2:mem:backend_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

external.api.base-url=https://example.test
external.api.api-key=test-api-key
external.api.timeout=10000
external.api.retry.max-attempts=3
external.api.retry.backoff=1000

sync.schedulers.enabled=false
